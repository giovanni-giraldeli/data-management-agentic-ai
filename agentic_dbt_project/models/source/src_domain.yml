sources:
  - name: domains
    description: Backend raw data for domain events and group associations.
    database: dev
    schema: main
    tables:
      - name: domain
        description: Large fact table containing domain events over time. Contains 8.2M rows.
        columns:
          - name: domain_id
            description: Unique identifier for the domain.
          - name: domain_group_id
            description: Foreign key linking to the domain_group table.
          - name: full_subpage_count
            description: The total count of subpages associated with the domain.
          - name: is_temp_domains
            description: Flag (0 or 1) indicating if the domain is classified as temporary.
          - name: dw_valid_from
            description: The start date of the period for which this record version is valid.
          - name: dw_valid_to
            description: The end date of the period for which this record version is valid.

      - name: domain_group
        description: Associates domain groups with their respective customers. Contains 1M rows.
        columns:
          - name: domain_group_id
            description: Unique identifier for the domain group.
          - name: customer_id
            description: Unique identifier for the customer associated with this group.
          - name: dw_valid_from
            description: The start date of the period for which this record version is valid.
          - name: dw_valid_to
            description: The end date of the period for which this record version is valid.
